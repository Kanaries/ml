name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Tests run against the COMMITTED fixtures in test_data/. They are the
  # reviewed baseline; this job must not regenerate them.
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'yarn'

    - name: Install dependencies
      run: yarn install --frozen-lockfile

    - name: Run tests
      run: yarn test

  # Regenerates fixtures with the pinned Python environment and fails if they
  # differ from the committed baseline. A red job here means either the pinned
  # environment no longer reproduces the fixtures or someone changed a gen
  # script without committing the regenerated fixtures.
  fixture-drift:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install pinned Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'yarn'

    - name: Install dependencies
      run: yarn install --frozen-lockfile

    - name: Regenerate sklearn reference fixtures
      run: yarn gen-data
      env:
        PYTHON: python

    - name: Fail on fixture drift
      run: |
        git diff --stat test_data/
        git diff --exit-code test_data/

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'yarn'

    - name: Install dependencies
      run: yarn install --frozen-lockfile

    - name: Build library
      run: yarn build

    - name: Build examples
      run: yarn build:example
